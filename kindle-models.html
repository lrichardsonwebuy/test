<!DOCTYPE html>
<html>
<head>
    <title>Kindle Models</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Kindle Models</h1>

<blockquote class="info">
Identify your Kindle model and the jailbreak method best suited for it.
</blockquote>

<button onclick="showDialog('find-jb')">Find Your Jailbreak</button>

<div class="modal-overlay" id="overlay">
    <div id="find-jb" class="modal-container">
        <div class="modal-header">
            <h2>Find My Jailbreak</h2>
        </div>
        <div class="modal-body">
            <p>Please enter the first 8 characters:</p>
            <input type="text" id="serialNumber" maxlength="8" oninput="searchForSerial()">
            <p id="searchStatus"></p>
            <div id="searchResult"></div>
        </div>
        <div class="modal-footer">
            <button onclick="closeDialog()">Close</button>
        </div>
    </div>
</div>

<script src="modelFinder.js"></script>

<script>
function showDialog() {
    document.getElementById("overlay").style.display = "flex";
}

function closeDialog() {
    document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
